version: '3.8'

services:
  ychangers-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: ychangers_site_container
    ports:
      - "3000:3000"
    restart: always

  telegram-bot:
    build:
      context: ./blinkgift-bot
      dockerfile: Dockerfile.bot
    container_name: telegram_bot_container
    restart: always
    environment:
      - BOT_NAME=${TELEGRAM_BOT_NAME}
      - BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BOT_URL=${TELEGRAM_BOT_URL}
    depends_on:
      - ychangers-web